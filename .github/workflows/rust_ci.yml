name: ESP-ROM CI

on:
  push:
    branches:
      - main
    paths:
      - "apps/esp-rom/**"
    paths-ignore:
      - "**/README.md"
  pull_request:
    paths:
      - "apps/esp-rom/**"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

defaults:
  run:
    working-directory: apps/esp-rom

jobs:
  rust-checks:
    name: ESP-ROM Rust Checks
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        action:
          - command: build
            args: --release
          - command: fmt
            args: --all -- --check --color always
          - command: clippy
            args: --all-targets --all-features --workspace -- -D warnings
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Rust
        uses: esp-rs/xtensa-toolchain@v1.6
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: true
      - name: Enable caching
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/esp-rom
      - name: Run command
        run: cargo ${{ matrix.action.command }} ${{ matrix.action.args }}
